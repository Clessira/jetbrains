name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and package only. Skip tag and GitHub Release."
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Test
        run: ./gradlew test

      - name: Build plugin
        run: ./gradlew buildPlugin verifyPluginStructure

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^pluginVersion=' gradle.properties | cut -d= -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Read release notes from changelog
        run: |
          bash scripts/release-notes.sh "${{ steps.version.outputs.version }}" > release-notes.md
          test -s release-notes.md

      - name: Ensure tag does not already exist
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Bump pluginVersion in gradle.properties before releasing."
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: nowdoing-jetbrains-${{ steps.version.outputs.version }}
          path: build/distributions/*.zip
          if-no-files-found: error

      - name: Tag release
        if: ${{ !inputs.dry_run }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            build/distributions/nowdoing-jetbrains-${{ steps.version.outputs.version }}.zip \
            --title "$TAG" \
            --notes-file release-notes.md

      # Marketplace publishing (./gradlew publishPlugin) is intentionally not
      # wired yet — it needs a JETBRAINS_MARKETPLACE_TOKEN secret and a
      # published plugin listing. Add a publish step here once both exist.
