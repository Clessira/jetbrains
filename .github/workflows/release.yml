name: Release

# Semantic-versioned releases are tag-driven: push an annotated tag `vX.Y.Z`
# (optionally `vX.Y.Z-beta.1`) and this workflow builds, verifies, cuts a
# GitHub Release and publishes to the JetBrains Marketplace. A manual
# `workflow_dispatch` run is a no-publish dry build for sanity-checking.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Manual dry build — derive a throwaway dev version from the SHA.
            VERSION="0.0.0-dev.${GITHUB_SHA::7}"
          fi
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::'$VERSION' is not a semantic version (expected X.Y.Z[-suffix])."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "PLUGIN_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Resolved version: $VERSION (event: ${{ github.event_name }})"

      - name: Test
        run: ./gradlew test

      - name: Build plugin
        run: ./gradlew buildPlugin verifyPluginStructure

      - name: Verify plugin against recommended IDEs
        run: ./gradlew verifyPlugin

      - name: Resolve distribution zip
        id: dist
        run: |
          ZIP=$(ls build/distributions/*.zip | head -n1)
          test -n "$ZIP"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "Built $ZIP"

      - uses: actions/upload-artifact@v4
        with:
          name: clessira-jetbrains-${{ steps.version.outputs.version }}
          path: build/distributions/*.zip
          if-no-files-found: error

      # --- Everything below runs only for a tag push (a real release) ---------

      - name: Read release notes from changelog
        if: github.event_name == 'push'
        run: |
          bash scripts/release-notes.sh "${{ steps.version.outputs.version }}" > release-notes.md
          test -s release-notes.md

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.dist.outputs.zip }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file release-notes.md

      - name: Publish to JetBrains Marketplace
        if: github.event_name == 'push'
        uses: CodingWithCalvin/GHA-JBMarketplacePublisher@v1
        with:
          marketplace-pat: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          archive-path: ${{ steps.dist.outputs.zip }}
          plugin-xml-id: com.clessira.jetbrains
          channel: stable
